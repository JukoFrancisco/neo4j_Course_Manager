<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <aside class="sidebar">
        <h2>Management System</h2>
        <ul class="sidebar-nav">
          <li>
            <a href="index.html"
              ><i class="fas fa-user-graduate"></i> Students</a
            >
          </li>
          <li>
            <a href="faculty.html"
              ><i class="fas fa-chalkboard-teacher"></i> Faculty</a
            >
          </li>
          <li>
            <a href="course.html" class="active"
              ><i class="fas fa-book"></i> Courses</a
            >
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <header>
          <h1>Course Management</h1>
        </header>

        <div class="content-body">
          <div class="form-container">
            <h2 id="form-title">Add New Course</h2>
            <form id="course-form">
              <input type="hidden" id="course-id" />

              <div class="form-group">
                <label for="course-code">Course Code</label>
                <input
                  type="text"
                  id="course-code"
                  name="courseCode"
                  placeholder="e.g. ITD110"
                  required
                />
              </div>

              <div class="form-group">
                <label for="course-name">Course Name</label>
                <input
                  type="text"
                  id="course-name"
                  name="courseName"
                  placeholder="e.g. NoSQL Databases"
                  required
                />
              </div>

              <div class="form-group">
                <label for="credits">Credits</label>
                <input
                  type="number"
                  id="credits"
                  name="credits"
                  min="1"
                  max="10"
                  placeholder="e.g. 3"
                />
              </div>

              <div class="form-group" style="grid-column: 1 / -1">
                <label for="description">Description</label>
                <textarea
                  id="description"
                  name="description"
                  rows="3"
                  placeholder="Enter course description..."
                ></textarea>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-add" id="submit-btn">
                  <i class="fas fa-plus"></i> Add Course
                </button>
                <button
                  type="button"
                  class="btn btn-cancel hidden"
                  id="cancel-btn"
                >
                  <i class="fas fa-times"></i> Cancel
                </button>
              </div>
            </form>
          </div>

          <div class="table-container">
            <h2>Course List</h2>
            <table id="course-table">
              <thead>
                <tr>
                  <th>Course Code</th>
                  <th>Course Name</th>
                  <th>Description</th>
                  <th>Credits</th>
                  <th>Enrolled Students</th>
                  <th>Teaching Faculty</th>
                  <th class="table-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="course-tbody"></tbody>
            </table>
            <p id="no-courses" class="no-data hidden">No courses found.</p>
          </div>
        </div>
      </main>
    </div>

    <script src="js/course.js"></script>
  </body>
</html>
