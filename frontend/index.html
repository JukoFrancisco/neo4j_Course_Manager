<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <div class="sidebar">
        <h2>Management System</h2>
        <ul>
          <li>
            <a href="index.html" class="active"
              ><i class="fas fa-user-graduate"></i> Students</a
            >
          </li>
          <li>
            <a href="faculty.html"
              ><i class="fas fa-chalkboard-teacher"></i> Faculty</a
            >
          </li>
          <li>
            <a href="course.html"><i class="fas fa-book"></i> Courses</a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <header>
          <h1>Student Management</h1>
        </header>

        <div class="content-body">
          <div id="add-student-form" class="form-container">
            <h2>Add New Student</h2>
            <form id="student-form">
              <input type="hidden" id="student_id_original" />

              <div class="form-group">
                <label for="student_id">Student ID:</label>
                <input
                  type="text"
                  id="student_id"
                  name="student_id"
                  placeholder="e.g. 2024-1001"
                  required
                />
              </div>

              <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required />
              </div>

              <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required />
              </div>

              <div class="form-group">
                <label for="address">Address:</label>
                <textarea
                  id="address"
                  name="address"
                  rows="3"
                  placeholder="Enter complete address"
                ></textarea>
              </div>

              <div class="form-group">
                <label for="phone">Phone:</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="e.g. 09123456789"
                />
              </div>

              <div class="form-group">
                <label for="date_of_birth">Date of Birth:</label>
                <input type="date" id="date_of_birth" name="date_of_birth" />
              </div>
              <div class="form-group">
                <label for="course_codes">Enrolled Courses:</label>
                <select id="course_codes" name="course_codes" multiple></select>
                <small class="form-text"
                  >Hold Ctrl/Cmd to select multiple courses</small
                >
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-add" id="submit-btn">
                  <i class="fas fa-user-plus"></i> Add Student
                </button>
                <button
                  type="button"
                  class="btn btn-cancel hidden"
                  id="cancel-btn"
                >
                  <i class="fas fa-times"></i> Cancel
                </button>
              </div>
            </form>
          </div>

          <div class="list-container">
            <h2>Student List</h2>
            <table id="student-table">
              <thead>
                <tr>
                  <th>Student ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Address</th>
                  <th>Phone</th>
                  <th>Date of Birth</th>
                  <th>Courses</th>
                  <th class="table-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="student-list"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="js/app.js"></script>
  </body>
</html>
