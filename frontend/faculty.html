<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <div class="sidebar">
        <h2>Management System</h2>
        <ul>
          <li>
            <a href="index.html"
              ><i class="fas fa-user-graduate"></i> Students</a
            >
          </li>
          <li>
            <a href="faculty.html" class="active"
              ><i class="fas fa-chalkboard-teacher"></i> Faculty</a
            >
          </li>
          <li>
            <a href="course.html"><i class="fas fa-book"></i> Courses</a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <header>
          <h1>Faculty Management</h1>
        </header>

        <div class="content-body">
          <div class="form-container">
            <h2 id="form-title">Add New Faculty</h2>
            <form id="faculty-form">
              <input type="hidden" id="faculty-id" />
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required />
              </div>
              <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" required />
              </div>
              <div class="form-group">
                <label for="courses">Teaching Load</label>
                <select id="courses" name="courses" multiple></select>
                <small class="form-text"
                  >Hold Ctrl/Cmd to select multiple</small
                >
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-add" id="submit-btn">
                  <i class="fas fa-plus"></i> Add Faculty
                </button>
                <button
                  type="button"
                  class="btn btn-cancel hidden"
                  id="cancel-btn"
                >
                  <i class="fas fa-times"></i> Cancel
                </button>
              </div>
            </form>
          </div>

          <div class="list-container">
            <h2>Faculty List</h2>
            <table id="faculty-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Address</th>
                  <th>Department</th>
                  <th>Courses</th>
                  <th class="table-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="faculty-tbody"></tbody>
            </table>
            <p id="no-faculty" class="no-data hidden">No faculty found.</p>
          </div>
        </div>
      </div>
    </div>
    <script src="js/faculty.js"></script>
  </body>
</html>
